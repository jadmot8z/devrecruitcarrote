<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevRecruit — Messages</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/layout.css">
  <style>
    .msg-layout { display:flex;height:calc(100vh - 56px);overflow:hidden; }

    /* Liste conversations */
    .conv-list {
      width:280px;min-width:280px;border-right:1px solid var(--border);
      display:flex;flex-direction:column;background:var(--surface);
    }
    .conv-list-header { padding:1rem 1.2rem;border-bottom:1px solid var(--border);font-weight:700;font-size:.95rem; }
    .conv-items { flex:1;overflow-y:auto; }
    .conv-item {
      display:flex;align-items:center;gap:.8rem;padding:.85rem 1.2rem;
      cursor:pointer;transition:background var(--transition);border-bottom:1px solid var(--border);
    }
    .conv-item:hover { background:var(--surface2); }
    .conv-item.active { background:var(--primary-lt); }
    .conv-avatar {
      width:38px;height:38px;border-radius:50%;background:var(--primary);
      color:#fff;display:flex;align-items:center;justify-content:center;
      font-weight:700;font-size:1rem;flex-shrink:0;
    }
    .conv-info { flex:1;min-width:0; }
    .conv-name { font-size:.875rem;font-weight:600;color:var(--text); }
    .conv-last { font-size:.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:.1rem; }
    .conv-role-chip { font-size:.68rem;font-weight:700;padding:.1em .5em;border-radius:999px; }
    .conv-unread {
      background:var(--danger);color:#fff;font-size:.7rem;font-weight:700;
      border-radius:999px;padding:.1em .45em;min-width:18px;text-align:center;
    }
    .no-convs { padding:2rem 1rem;text-align:center;color:var(--muted);font-size:.875rem; }

    /* Zone de chat */
    .chat-area {
      flex:1;display:flex;flex-direction:column;min-width:0;
      background:var(--bg);
    }
    .chat-empty {
      flex:1;display:flex;flex-direction:column;align-items:center;
      justify-content:center;color:var(--muted);gap:.5rem;
    }
    .chat-empty .icon { font-size:3rem; }

    .chat-header {
      padding:.9rem 1.2rem;border-bottom:1px solid var(--border);
      background:var(--surface);display:flex;align-items:center;
      justify-content:space-between;gap:.8rem;
    }
    .chat-header-info { display:flex;align-items:center;gap:.7rem; }
    .chat-header-name { font-weight:700;font-size:.95rem; }
    .chat-header-actions { display:flex;gap:.4rem; }

    .chat-messages {
      flex:1;overflow-y:auto;padding:1rem 1.2rem;
      display:flex;flex-direction:column;gap:.3rem;
    }
    .msg-day-divider {
      text-align:center;font-size:.75rem;color:var(--muted);
      margin:.6rem 0;position:relative;
    }
    .msg-day-divider::before,.msg-day-divider::after {
      content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border);
    }
    .msg-day-divider::before{left:0} .msg-day-divider::after{right:0}

    .msg-bubble {
      display:flex;align-items:flex-end;gap:.5rem;max-width:75%;
    }
    .msg-bubble.mine { align-self:flex-end;flex-direction:row-reverse; }
    .msg-avatar {
      width:28px;height:28px;border-radius:50%;background:var(--primary);
      color:#fff;display:flex;align-items:center;justify-content:center;
      font-size:.75rem;font-weight:700;flex-shrink:0;
    }
    .msg-bubble.mine .msg-avatar { background:var(--accent); }
    .msg-content {}
    .msg-text {
      background:var(--surface);border:1px solid var(--border);
      border-radius:12px 12px 12px 3px;padding:.5rem .8rem;
      font-size:.875rem;line-height:1.5;color:var(--text);
      word-break:break-word;
    }
    .msg-bubble.mine .msg-text {
      background:var(--primary);color:#fff;border-color:var(--primary);
      border-radius:12px 12px 3px 12px;
    }
    .msg-image { max-width:220px;border-radius:8px;margin-top:.3rem;cursor:pointer; }
    .msg-time { font-size:.68rem;color:var(--muted);margin-top:.2rem;text-align:right; }
    .msg-bubble.mine .msg-time { text-align:left; }

    /* Input bar */
    .chat-input-bar {
      padding:.8rem 1.2rem;border-top:1px solid var(--border);
      background:var(--surface);display:flex;align-items:flex-end;gap:.6rem;
    }
    .input-actions { display:flex;gap:.3rem;flex-shrink:0; }
    .action-btn {
      background:none;border:none;font-size:1.2rem;color:var(--muted);
      cursor:pointer;padding:.3rem;border-radius:6px;transition:all var(--transition);
      line-height:1;
    }
    .action-btn:hover { color:var(--primary);background:var(--surface2); }
    .msg-textarea {
      flex:1;border:1.5px solid var(--border);border-radius:var(--radius-sm);
      padding:.55rem .8rem;font-size:.9rem;background:var(--bg);color:var(--text);
      resize:none;font-family:inherit;max-height:120px;min-height:38px;outline:none;
      transition:border-color var(--transition);line-height:1.4;
    }
    .msg-textarea:focus { border-color:var(--primary); }
    #img-msg-input { display:none; }

    /* Emoji picker simple */
    .emoji-picker {
      position:absolute;bottom:70px;left:1.2rem;
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);padding:.6rem;
      display:none;flex-wrap:wrap;gap:.3rem;width:220px;
      box-shadow:var(--shadow-md);z-index:50;
    }
    .emoji-picker.show { display:flex; }
    .emoji-btn { font-size:1.3rem;cursor:pointer;padding:.2rem;border-radius:4px;transition:background var(--transition); }
    .emoji-btn:hover { background:var(--surface2); }

    /* Context menu */
    .ctx-menu {
      position:fixed;background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius-sm);box-shadow:var(--shadow-md);
      z-index:1000;padding:.3rem;display:none;min-width:140px;
    }
    .ctx-menu.show { display:block; }
    .ctx-item {
      padding:.5rem .8rem;font-size:.85rem;border-radius:6px;
      cursor:pointer;display:flex;align-items:center;gap:.5rem;
      transition:background var(--transition);
    }
    .ctx-item:hover { background:var(--surface2); }
    .ctx-item.danger { color:var(--danger); }
    .ctx-item.danger:hover { background:var(--danger-lt); }

    /* Blocked banner */
    .blocked-banner {
      background:var(--danger-lt);border:1px solid var(--danger);
      border-radius:var(--radius-sm);padding:.7rem 1rem;
      font-size:.875rem;color:var(--danger);text-align:center;margin:.6rem;
    }

    @media(max-width:600px) {
      .conv-list { width:100%;min-width:unset;display:none;position:absolute;inset:0;z-index:50; }
      .conv-list.mobile-open { display:flex; }
      .chat-area { width:100%; }
    }
  </style>
</head>
<body>
<div id="toast-container"></div>
<div class="app-root">
  <div id="app-layout">
    <div class="msg-layout">
      <!-- Liste conversations -->
      <div class="conv-list" id="conv-list">
        <div class="conv-list-header">💬 Messages</div>
        <div class="conv-items" id="conv-items">
          <div class="no-convs">Aucune conversation pour le moment.</div>
        </div>
      </div>

      <!-- Zone chat -->
      <div class="chat-area" id="chat-area">
        <div class="chat-empty" id="chat-empty">
          <div class="icon">💬</div>
          <div>Sélectionne une conversation</div>
        </div>

        <div id="chat-main" class="hidden" style="display:none;flex-direction:column;flex:1;min-height:0;">
          <div class="chat-header">
            <div class="chat-header-info">
              <div class="conv-avatar" id="chat-avatar">?</div>
              <div>
                <div class="chat-header-name" id="chat-name">…</div>
                <span class="chip" id="chat-role-chip"></span>
              </div>
            </div>
            <div class="chat-header-actions">
              <button class="btn btn-secondary btn-sm" onclick="blockUser()" id="btn-block">🚫 Bloquer</button>
              <button class="btn btn-danger btn-sm" onclick="deleteConv()">🗑 Supprimer</button>
            </div>
          </div>
          <div class="chat-messages" id="chat-messages"></div>
          <div id="blocked-banner" class="blocked-banner hidden">
            Tu as bloqué cet utilisateur. <button class="btn btn-sm btn-secondary" onclick="unblockUser()">Débloquer</button>
          </div>
          <div class="chat-input-bar" id="chat-input-bar" style="position:relative">
            <div class="input-actions">
              <button class="action-btn" onclick="toggleEmoji()" title="Emoji">😊</button>
              <button class="action-btn" onclick="document.getElementById('img-msg-input').click()" title="Image">🖼️</button>
            </div>
            <textarea class="msg-textarea" id="msg-input" placeholder="Envoyer un message…" rows="1"
              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
            <button class="btn btn-primary btn-sm" onclick="sendMessage()">Envoyer</button>
            <input type="file" id="img-msg-input" accept="image/*" onchange="sendImage(this)">
            <!-- Emoji picker -->
            <div class="emoji-picker" id="emoji-picker">
              😀 😂 😍 🎮 🚀 🔥 👍 🎉 💯 🤔 😅 🙏 ⭐ 💬 🛠️ 🎨 💻 📣 ✅ ❌
              .split(' ').map isn't needed — use onclick on each
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Context menu -->
<div class="ctx-menu" id="ctx-menu">
  <div class="ctx-item" onclick="copyMsg()">📋 Copier</div>
  <div class="ctx-item danger" onclick="deleteMsg()">🗑 Supprimer</div>
</div>

<script type="module">
import { supabase } from '../js/supabase-config.js';
import { requireAuth, toast } from '../js/layout.js';

let userId = null, activeConvId = null, activeOtherId = null;
let msgSubscription = null, ctxMsgId = null;

requireAuth(async (user, profile) => {
  userId = user.id;
  document.getElementById('page-title').textContent = 'Messages';
  loadConversations();
  buildEmojiPicker();
});

// ── Conversations ──────────────────────────────────────────
async function loadConversations() {
  const { data, error } = await supabase
    .from('conversations')
    .select('*')
    .contains('members', [userId])
    .order('last_at', { ascending: false });

  if (!data || !data.length) return;

  const items = document.getElementById('conv-items');
  items.innerHTML = '';

  for (const conv of data) {
    const otherId = conv.members.find(m => m !== userId);
    const { data: other } = await supabase.from('profiles').select('email,role,sub').eq('id', otherId).single();
    const unread = conv.unread?.[userId] || 0;
    const roleLabel = { owner:'Propriétaire', admin:'Créateur', comms:'Chargé de com.' }[other?.role] || '';
    const chipCls = { owner:'chip-owner', admin:'chip-dev', comms:'chip-comms' }[other?.role] || '';

    const el = document.createElement('div');
    el.className = 'conv-item';
    el.dataset.convId = conv.id;
    el.dataset.otherId = otherId;
    el.innerHTML = `
      <div class="conv-avatar">${(other?.email||'?')[0].toUpperCase()}</div>
      <div class="conv-info">
        <div class="conv-name">${other?.email || 'Inconnu'} <span class="conv-role-chip chip ${chipCls}">${roleLabel}</span></div>
        <div class="conv-last">${conv.last_message || ''}</div>
      </div>
      ${unread > 0 ? `<span class="conv-unread">${unread}</span>` : ''}
    `;
    el.onclick = () => openConv(conv.id, otherId, other, el);
    items.appendChild(el);
  }
}

// ── Open conversation ──────────────────────────────────────
async function openConv(convId, otherId, other, el) {
  activeConvId = convId; activeOtherId = otherId;
  document.querySelectorAll('.conv-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');

  const roleLabel = { owner:'Propriétaire', admin:'Créateur de contenu', comms:'Chargé de com.' }[other?.role] || '';
  const chipCls = { owner:'chip-owner', admin:'chip-dev', comms:'chip-comms' }[other?.role] || '';
  document.getElementById('chat-avatar').textContent = (other?.email||'?')[0].toUpperCase();
  document.getElementById('chat-name').textContent = other?.email || 'Inconnu';
  const chip = document.getElementById('chat-role-chip');
  chip.textContent = roleLabel; chip.className = `chip ${chipCls}`;

  document.getElementById('chat-empty').classList.add('hidden');
  const main = document.getElementById('chat-main');
  main.style.display = 'flex';

  // Vérif blocage
  const { data: blockData } = await supabase.from('blocks')
    .select('id').eq('blocker_id', userId).eq('blocked_id', otherId).single();
  const isBlocked = !!blockData;
  document.getElementById('blocked-banner').classList.toggle('hidden', !isBlocked);
  document.getElementById('chat-input-bar').style.display = isBlocked ? 'none' : 'flex';
  document.getElementById('btn-block').textContent = isBlocked ? '✅ Débloqué' : '🚫 Bloquer';

  // Marquer comme lu
  await supabase.from('conversations').update({ [`unread`]: { [userId]: 0 } }).eq('id', convId);
  el.querySelector('.conv-unread')?.remove();

  loadMessages(convId);
}

// ── Messages ───────────────────────────────────────────────
function loadMessages(convId) {
  if (msgSubscription) msgSubscription.unsubscribe();
  const container = document.getElementById('chat-messages');
  container.innerHTML = '';

  // Charge les messages existants
  supabase.from('messages').select('*').eq('conv_id', convId).order('created_at').then(({ data }) => {
    (data || []).forEach(m => appendMsg(m));
    container.scrollTop = container.scrollHeight;
  });

  // Écoute temps réel
  msgSubscription = supabase.channel('msgs_'+convId)
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages', filter:`conv_id=eq.${convId}` }, payload => {
      appendMsg(payload.new);
      container.scrollTop = container.scrollHeight;
    })
    .subscribe();
}

function appendMsg(m) {
  const container = document.getElementById('chat-messages');
  const mine = m.sender_id === userId;
  const time = new Date(m.created_at).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
  const el = document.createElement('div');
  el.className = 'msg-bubble' + (mine ? ' mine' : '');
  el.dataset.msgId = m.id;
  const initial = mine ? (document.getElementById('chat-name').textContent || 'M')[0] : document.getElementById('chat-avatar').textContent;
  let content = '';
  if (m.image_url) {
    content = `<img src="${m.image_url}" class="msg-image" onclick="window.open('${m.image_url}')">`;
  } else {
    content = `<div class="msg-text">${escHtml(m.text || '')}</div>`;
  }
  el.innerHTML = `
    <div class="msg-avatar">${mine ? 'Moi'[0] : initial}</div>
    <div class="msg-content">
      ${content}
      <div class="msg-time">${time}</div>
    </div>
  `;
  el.addEventListener('contextmenu', e => { e.preventDefault(); showCtx(e, m.id, mine); });
  container.appendChild(el);
}

// ── Send message ───────────────────────────────────────────
window.sendMessage = async () => {
  if (!activeConvId) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = '';

  await supabase.from('messages').insert({ conv_id: activeConvId, sender_id: userId, text });
  await supabase.from('conversations').update({
    last_message: text, last_at: new Date().toISOString(),
    unread: { [activeOtherId]: 1 }
  }).eq('id', activeConvId);
};

window.handleKey = (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.sendMessage(); }
};
window.autoResize = (el) => {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
};

// ── Send image ─────────────────────────────────────────────
window.sendImage = async (input) => {
  const file = input.files[0];
  if (!file || !activeConvId) return;
  if (file.size > 5*1024*1024) { toast('Image trop lourde', 'error'); return; }
  const ext = file.name.split('.').pop();
  const path = `msgs/${activeConvId}_${Date.now()}.${ext}`;
  const { error } = await supabase.storage.from('images').upload(path, file);
  if (error) { toast('Erreur upload', 'error'); return; }
  const { data } = supabase.storage.from('images').getPublicUrl(path);
  await supabase.from('messages').insert({ conv_id: activeConvId, sender_id: userId, image_url: data.publicUrl });
  await supabase.from('conversations').update({ last_message: '🖼️ Image', last_at: new Date().toISOString() }).eq('id', activeConvId);
};

// ── Emoji ──────────────────────────────────────────────────
window.toggleEmoji = () => {
  document.getElementById('emoji-picker').classList.toggle('show');
};
function buildEmojiPicker() {
  const emojis = ['😀','😂','😍','🎮','🚀','🔥','👍','🎉','💯','🤔','😅','🙏','⭐','💬','🛠️','🎨','💻','📣','✅','❌','💪','🏆'];
  const picker = document.getElementById('emoji-picker');
  picker.innerHTML = emojis.map(e => `<span class="emoji-btn" onclick="insertEmoji('${e}')">${e}</span>`).join('');
}
window.insertEmoji = (e) => {
  const input = document.getElementById('msg-input');
  input.value += e; input.focus();
  document.getElementById('emoji-picker').classList.remove('show');
};
document.addEventListener('click', e => {
  if (!e.target.closest('.emoji-picker') && !e.target.closest('.action-btn'))
    document.getElementById('emoji-picker')?.classList.remove('show');
  if (!e.target.closest('.ctx-menu')) document.getElementById('ctx-menu').classList.remove('show');
});

// ── Context menu ───────────────────────────────────────────
window.showCtx = (e, msgId, mine) => {
  ctxMsgId = msgId;
  const menu = document.getElementById('ctx-menu');
  menu.style.left = e.clientX+'px'; menu.style.top = e.clientY+'px';
  menu.querySelector('.ctx-item.danger').style.display = mine ? 'flex' : 'none';
  menu.classList.add('show');
};
window.copyMsg = async () => {
  const el = document.querySelector(`[data-msg-id="${ctxMsgId}"] .msg-text`);
  if (el) await navigator.clipboard.writeText(el.textContent);
  document.getElementById('ctx-menu').classList.remove('show');
};
window.deleteMsg = async () => {
  await supabase.from('messages').delete().eq('id', ctxMsgId).eq('sender_id', userId);
  document.querySelector(`[data-msg-id="${ctxMsgId}"]`)?.remove();
  document.getElementById('ctx-menu').classList.remove('show');
};

// ── Block / unblock ────────────────────────────────────────
window.blockUser = async () => {
  if (!activeOtherId) return;
  await supabase.from('blocks').insert({ blocker_id: userId, blocked_id: activeOtherId });
  document.getElementById('blocked-banner').classList.remove('hidden');
  document.getElementById('chat-input-bar').style.display = 'none';
  document.getElementById('btn-block').textContent = '✅ Bloqué';
  toast('Utilisateur bloqué.', 'info');
};
window.unblockUser = async () => {
  await supabase.from('blocks').delete().eq('blocker_id', userId).eq('blocked_id', activeOtherId);
  document.getElementById('blocked-banner').classList.add('hidden');
  document.getElementById('chat-input-bar').style.display = 'flex';
  document.getElementById('btn-block').textContent = '🚫 Bloquer';
  toast('Utilisateur débloqué.', 'success');
};

// ── Delete conversation ────────────────────────────────────
window.deleteConv = async () => {
  if (!activeConvId || !confirm('Supprimer cette conversation ?')) return;
  await supabase.from('messages').delete().eq('conv_id', activeConvId);
  await supabase.from('conversations').delete().eq('id', activeConvId);
  window.location.reload();
};

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
